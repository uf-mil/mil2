[workspace]
channels = ["robostack-jazzy", "conda-forge"]
name = "mil2"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[system-requirements]
libc = { family = "glibc", version = "2.34" }

[dependencies]
binutils = ">=2.45.1,<3"
colcon-common-extensions = ">=0.3.0,<0.4"
gxx = ">=15.2.0,<15.3"
make = ">=4.4.1,<5"
sysroot_linux-64 = ">=2.34,<3"

nlohmann_json = ">=3.12.0,<4"
ros-jazzy-backward-ros = ">=1.0.8,<2"
ros-jazzy-behaviortree-cpp = ">=4.8.3,<5"
ros-jazzy-control-toolbox = ">=4.9.0,<5"
ros-jazzy-geographic-msgs = ">=1.0.6,<2"
ros-jazzy-nav2-util = ">=1.3.11,<2"
ros-jazzy-robot-localization = ">=3.8.3,<4"
ros-jazzy-ros-base = ">=0.11.0,<0.12"
ros-jazzy-ros-gz = ">=1.0.19,<2"
ros-jazzy-vision-opencv = ">=4.1.0,<5"

[activation.env]
GZ_VERSION = "harmonic"
