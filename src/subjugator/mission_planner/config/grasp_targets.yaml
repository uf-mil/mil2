---
# Canonical Task-5 grasp-target names: the single source of truth for
#   - the mission target labels (loaded onto the blackboard as grasp_targets /
#     grasp_target by mission_planner_node, used by the grasp missions)
#   - the sim GripperControl <graspable> allowlist (sub9_sim.urdf.xacro loads
#     this same file via xacro.load_yaml)
#
# These names MUST match the prop <model name="..."> entries in
# robosub_2025.world (the Gazebo entity names) and the down-cam YOLO class
# strings (octagon_sim.pt). Edit the list here only.
#
# These are the real Task-5 objects, using Jack's table_2026 meshes. The world
# props in robosub_2025.world carry these same names (static=false, box
# collision, so the gripper can grab them) and octagon_sim.pt detects them.
grasp_targets:
  - electric_box
  - nut_cylinder
  - pill_cylinder
  - bandaid_box
